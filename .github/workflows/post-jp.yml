# PURPOSE: ここらのリール動画を日本語で1日1回、@waveblasttaiyo へ自動投稿する。
# 枠（JST）: 12:30 ＝ UTC 03:30
#
# 頻度の根拠（2026-07-20 変更）:
#   X API はリクエスト従量課金で、1投稿あたり約 $0.05。当初の1日6投稿（和3+英3）は
#   月およそ $8.7 かかり、請求サイクル上限 $1.00 に3〜4日で当たって投稿が止まった。
#   和1+英1 の1日2投稿なら月$3程度に収まる。頻度を戻すときは必ず上限とクレジット残高を先に確認すること。
name: Post kokora reel (JA)

on:
  schedule:
    - cron: "30 3 * * *"   # JST 12:30
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true で投稿せず内容だけ確認"
        required: false
        default: "false"

concurrency:
  group: kokora-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet tweepy

      - name: Post (JA)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/post_to_x.py --lang ja --dry-run
          else
            python scripts/post_to_x.py --lang ja
          fi

      - name: Save rotation state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue/state.json
          git diff --staged --quiet || git commit -m "log: kokora JA 投稿記録 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
