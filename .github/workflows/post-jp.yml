# PURPOSE: ここらのリール動画を日本語で1日3回、@waveblasttaiyo へ自動投稿する。
# 枠（JST）: 08:00 / 12:30 / 20:00 ＝ UTC 23:00(前日) / 03:30 / 11:00
name: Post kokora reel (JA)

on:
  schedule:
    - cron: "0 23 * * *"   # JST 08:00
    - cron: "30 3 * * *"   # JST 12:30
    - cron: "0 11 * * *"   # JST 20:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true で投稿せず内容だけ確認"
        required: false
        default: "false"

concurrency:
  group: kokora-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet tweepy

      - name: Post (JA)
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/post_to_x.py --lang ja --dry-run
          else
            python scripts/post_to_x.py --lang ja
          fi

      - name: Save rotation state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add queue/state.json
          git diff --staged --quiet || git commit -m "log: kokora JA 投稿記録 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
